name: Release

# Build signed-less release installers for macOS + Windows and publish them as a
# GitHub Release (auto-published). Trigger manually (Actions → Release → Run workflow) or by
# pushing a tag like `v0.1.0`. The release version comes from src-tauri/tauri.conf.json
# (the `__VERSION__` placeholder), so bump that to cut a new version.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M-series) .dmg/.app
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest # Intel .dmg/.app
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest # x64 .msi + .exe (NSIS)
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "AniAni v__VERSION__"
          releaseBody: |
            下载对应平台的安装包：
            - Windows（x64）：`.msi` 或 `.exe`
            - macOS：Apple Silicon（M 系列芯片）选 `aarch64`，Intel 芯片选 `x64` 的 `.dmg`

            macOS 首次打开如提示“无法验证开发者/已损坏”，请右键图标 → 打开（应用未做苹果签名）。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
