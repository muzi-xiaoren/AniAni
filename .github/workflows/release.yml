name: Release

# Build signed-less release installers for macOS + Windows and publish them as a
# GitHub Release (auto-published). Trigger manually (Actions → Release → Run workflow) or by
# pushing a tag like `v0.1.0`. The release version comes from src-tauri/tauri.conf.json
# (the `__VERSION__` placeholder), so bump that to cut a new version.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (M-series) .dmg/.app
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest # Intel .dmg/.app
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest # x64 .msi + .exe (NSIS)
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "AniAni v__VERSION__"
          releaseBody: |
            ## 下载哪个文件 / Which file do I download?

            | 文件 / File | 平台 / Platform |
            | --- | --- |
            | `*_aarch64.dmg` | macOS · Apple Silicon（M1/M2/M3…） |
            | `*_x64.dmg` | macOS · Intel |
            | `*_x64-setup.exe` | Windows x64（推荐 / recommended, NSIS） |
            | `*_x64_en-US.msi` | Windows x64（MSI） |
            | `*_aarch64.app.tar.gz` / `*_x64.app.tar.gz` | 自动更新包，普通安装请忽略 / updater archives — ignore for a normal install |

            首次打开 / First launch:
            - macOS 若提示“无法验证开发者/已损坏”，右键图标 → 打开（应用未签名）。
            - Windows 若有 SmartScreen 提示，点“更多信息 → 仍要运行”。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
